<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Weather Vote</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>🌤️ Class Weather Vote 🌤️</h1>

    <div class="card">
        <h2 id="question">Loading...</h2>
        <div id="options"></div>
        <p id="voteMessage" class="muted"></p>
    </div>

    <div class="card">
        <h3>📊 Live Results 📊</h3>
        <p class="muted">🔄 Auto-refreshes every 2 seconds</p>
        <div id="results"></div>
        <p id="totalVotes" class="muted"></p>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
